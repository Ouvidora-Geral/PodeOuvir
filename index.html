<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎙️ PodeOuvir!</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Exo 2', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
      --primary: #0f2027;
      --secondary: #1a1a2e;
      --accent: #00ffe7;
      --accent-light: #00e1ff;
      --background: #0d0d0d;
      --surface: #16213e;
      --text: #ffffff;
      --text-secondary: #b0c4de;
      --glow: 0 0 20px rgba(0, 255, 231, 0.7);
    }

    body {
      background: radial-gradient(circle at top, var(--background), var(--secondary), var(--primary));
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="%2300ffe7" opacity="0.3"/></svg>') repeat;
      animation: stars 100s linear infinite;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes stars {
      from { background-position: 0 0; }
      to { background-position: 1000px 1000px; }
    }

    header {
      margin-top: 40px;
      position: relative;
      z-index: 10;
    }

    header h1 {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent-light), 0 0 60px rgba(0, 225, 255, 0.6);
      transform: perspective(800px) rotateX(5deg) scale(1);
      animation: pulse 3s infinite alternate;
      letter-spacing: 2px;
      position: relative;
    }

    @keyframes pulse {
      0% {
        text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent-light), 0 0 60px rgba(0, 225, 255, 0.6);
        transform: scale(1);
      }

        text-shadow: 0 0 30px #ff00ff,
